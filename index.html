<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Hole Foods — eat everything, grow forever</title>
  <meta name="description" content="You are a hole. Swallow berries, cakes, toys, cars and whole city blocks in an endless, procedurally generated world. The further you roam, the bigger everything gets.">
  <meta name="theme-color" content="#150a2b">
  <meta property="og:title" content="Hole Foods">
  <meta property="og:description" content="You are a hole. Eat berries, cakes, cars and whole city blocks in an endless procedurally generated world.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://maninae.github.io/hole-foods/">
  <meta property="og:image" content="https://maninae.github.io/hole-foods/media/og.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='52' r='38' fill='%23150a2b' stroke='%23fff3e0' stroke-width='9'/></svg>">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/ui.css">
  <link rel="stylesheet" href="css/collection.css">
</head>
<body>
  <canvas id="game"></canvas>
  <div id="vignette"></div>

  <div id="hud" class="hidden">
    <div class="hud-left">
      <div id="level-badge">1</div>
      <div class="level-meta">
        <div id="level-bar"><div id="level-fill"></div></div>
        <div id="size-label">44 cm</div>
      </div>
    </div>
    <div id="score">0</div>
    <div class="hud-right">
      <button id="btn-mute" aria-label="Toggle sound">🔊</button>
      <button id="btn-pause" aria-label="Pause">⏸</button>
    </div>
    <div id="combo" class="hidden">×2</div>
    <div id="toast" class="hidden"></div>
    <div id="unlock-banner" class="hidden" role="status" aria-live="polite">
      <div class="unlock-emoji" aria-hidden="true"></div>
      <div class="unlock-text">
        <div class="unlock-eyebrow">Unlocked</div>
        <div class="unlock-name"></div>
      </div>
    </div>
  </div>

  <div id="start" class="overlay">
    <div class="panel">
      <div class="title-hole" aria-hidden="true"></div>
      <h1>HOLE FOODS</h1>
      <p class="tagline">You are a hole. Everything fits, eventually.</p>
      <p id="best-line">Eat everything. Grow forever.</p>
      <button id="btn-play" class="big-btn">Play</button>
      <div class="btn-row">
        <button id="btn-collection-start" class="mid-btn">🗺️ Collection</button>
      </div>
      <p class="hints">Arrow keys / WASD&ensp;·&ensp;drag on touch</p>
    </div>
  </div>

  <div id="pause" class="overlay hidden">
    <div class="panel">
      <h2>Paused</h2>
      <button id="btn-resume" class="big-btn">Resume</button>
      <div class="btn-row">
        <button id="btn-restart" class="mid-btn">↺ Restart run</button>
        <button id="btn-collection-pause" class="mid-btn">🗺️ Collection</button>
        <button id="btn-sound" class="mid-btn">🔊 Sound: on</button>
      </div>
      <p class="hints">Esc / P pauses&ensp;·&ensp;roam outward — everything gets bigger</p>
    </div>
  </div>

  <div id="collection" class="overlay hidden" aria-hidden="true">
    <div class="panel collection-panel">
      <button id="btn-collection-close" class="collection-close" aria-label="Close">×</button>
      <h2>Collection</h2>
      <section class="collection-section">
        <div class="collection-heading">
          <h3>Discoveries</h3>
          <span class="collection-progress" id="collection-progress-themes">0 / 18</span>
        </div>
        <div class="sticker-grid" id="sticker-grid"></div>
      </section>
      <section class="collection-section">
        <div class="collection-heading">
          <h3>Achievements</h3>
          <span class="collection-progress" id="collection-progress-achievements">0 / 0</span>
        </div>
        <ul class="achievement-list" id="achievement-list"></ul>
      </section>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
